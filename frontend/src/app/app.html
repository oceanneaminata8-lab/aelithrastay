<header class="topbar">
  <a class="brand" routerLink="/">AelithraStay</a>
  <nav class="nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Explore</a>
    <a routerLink="/host" routerLinkActive="active">Host</a>
    <a routerLink="/bookings" routerLinkActive="active">Bookings</a>
    <a routerLink="/wishlist" routerLinkActive="active">Wishlist</a>
    @if (auth.currentUser()?.role === 'admin') {
      <a routerLink="/admin" routerLinkActive="active">Admin</a>
    }
  </nav>
  <div class="account">
    @if (auth.currentUser()) {
      <a routerLink="/profile">{{ auth.currentUser()?.username }}</a>
      <button type="button" (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/login">Login</a>
      <a class="button-link" routerLink="/register">Register</a>
    }
  </div>
</header>

<main>
  <router-outlet />
</main>
